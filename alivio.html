<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="theme-color" content="#d4a017" />
<title>Alívio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Carlito','Calibri',sans-serif;background:#fafaf9;color:#1c1917;-webkit-font-smoothing:antialiased;}
#carregando{text-align:center;padding:80px 20px;color:#78716c;font-size:14px;font-family:'Carlito','Calibri',sans-serif;}

:root{
  --gold:#d4a017; --gold-deep:#8a6b0f; --gold-rich:#b88509; --gold-soft:#fdf6e3;
  --gold-line:#f0d97c; --gold-bg:#fffbeb;
  --green:#16a34a; --green-deep:#14532d; --green-soft:#dcfce7;
  --red:#dc2626; --red-soft:#fee2e2; --red-deep:#991b1b;
  --ink:#1c1917; --ink-soft:#44403c; --muted:#78716c;
  --line:#e7e5e4; --line-soft:#f5f5f4;
  --surface:#ffffff; --bg:#fafaf9; --surface2:#f5f5f4;
  --shadow-sm:0 1px 2px rgba(28,25,23,.04), 0 1px 1px rgba(28,25,23,.03);
  --shadow:0 4px 12px rgba(28,25,23,.06), 0 2px 4px rgba(28,25,23,.04);
  --shadow-lg:0 12px 32px rgba(28,25,23,.10), 0 4px 8px rgba(28,25,23,.06);
}
button{font-family:inherit;}
.alv-shell{min-height:100vh;}
.alv-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;}
.alv-shadow{box-shadow:var(--shadow);}
.alv-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.alv-input{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;
  background:var(--surface);color:var(--ink);font-family:inherit;font-size:14px;outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.alv-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,160,23,.15);}
.alv-btn{
  border:none;border-radius:9px;font-family:inherit;font-weight:700;cursor:pointer;
  transition:transform .1s, box-shadow .15s, background .15s, color .15s;
}
.alv-btn:hover{transform:translateY(-1px);}
.alv-btn:active{transform:translateY(0);}
.alv-btn-primary{background:var(--gold);color:var(--ink);}
.alv-btn-primary:hover{background:var(--gold-rich);}
.alv-btn-ghost{background:transparent;color:var(--ink);}
.alv-btn-ghost:hover{background:var(--surface2);}
.alv-btn-ink{background:var(--ink);color:#fff;}
.alv-btn-ink:hover{background:#000;}
.alv-row{display:flex;align-items:center;}
.alv-fade{animation:alvFade .25s ease-out;}
@keyframes alvFade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.alv-mes{
  padding:7px 13px;border-radius:7px;font-size:12.5px;font-weight:700;cursor:pointer;
  background:var(--surface);border:1px solid var(--line);color:var(--muted);
  white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:inherit;
}
.alv-mes:hover{border-color:var(--gold-line);color:var(--ink);}
.alv-mes.on{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.alv-mes.arq{opacity:.45;}

.alv-tab{
  padding:9px 14px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;
  background:transparent;border:none;color:var(--muted);transition:all .15s;
  display:flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;
}
.alv-tab:hover{color:var(--ink);background:var(--surface2);}
.alv-tab.on{background:var(--ink);color:var(--surface);}

.alv-logo{font-weight:700;font-size:22px;letter-spacing:-.02em;color:var(--ink);}
.alv-logo span{color:var(--gold);}

.alv-stat{padding:18px 20px;border-radius:14px;background:var(--surface);border:1px solid var(--line);}
.alv-stat-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.alv-stat-value{font-size:30px;font-weight:700;line-height:1.1;margin-top:6px;letter-spacing:-.02em;}
.alv-stat-sub{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.4;}
.alv-stat.gold{background:linear-gradient(135deg,#fef9e7 0%,#fdf3c4 100%);border-color:var(--gold-line);}
.alv-stat.gold .alv-stat-value{color:var(--gold-deep);}
.alv-stat.green{background:var(--green-soft);border-color:#86efac;}
.alv-stat.green .alv-stat-value{color:var(--green-deep);}
.alv-stat.red{background:var(--red-soft);border-color:#fca5a5;}
.alv-stat.red .alv-stat-value{color:var(--red-deep);}

.alv-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:var(--surface);transition:border-color .15s;}
.alv-item:hover{border-color:var(--gold-line);}
.alv-cat-tag{padding:3px 9px;border-radius:6px;background:var(--gold-soft);color:var(--gold-deep);font-size:10.5px;font-weight:700;letter-spacing:.04em;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;}

.alv-mes-strip::-webkit-scrollbar{height:6px;}
.alv-mes-strip::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}

@media (max-width: 640px){
  .alv-stat-value{font-size:24px;}
  .alv-tab{padding:8px 11px;font-size:12px;}
  .alv-logo{font-size:18px;}
}
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.2.0,react-dom@18.2.0",
    "lucide-react": "https://esm.sh/lucide-react@0.383.0?deps=react@18.2.0"
  }
}
</script>
</head>
<body>
<div id="root"><div id="carregando">Carregando o Alívio…</div></div>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect } from 'react';
import { createRoot } from 'react-dom/client';
import { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, Legend } from 'recharts';
import {
  Lock, LogOut, Settings, Plus, Trash2, X, TrendingUp, TrendingDown,
  Wallet, ArrowUp, ArrowDown, Check, Archive, Eye, EyeOff, Pencil, ArrowLeft
} from 'lucide-react';

/* =================== constantes =================== */
const MESES = [
  "Jun/26", "Jul/26", "Ago/26", "Set/26", "Out/26", "Nov/26", "Dez/26",
  "Jan/27", "Fev/27", "Mar/27", "Abr/27", "Mai/27", "Jun/27",
  "Jul/27", "Ago/27", "Set/27", "Out/27", "Nov/27", "Dez/27",
];
const MES_PADRAO = "Jun/26";
const SENHA_INICIAL = "alivio@123.$";

const CAT_DESPESA = [
  { id: "moradia", nome: "Moradia", emoji: "🏠" },
  { id: "saude", nome: "Saúde", emoji: "🩺" },
  { id: "farmacia", nome: "Farmácia", emoji: "💊" },
  { id: "faxina", nome: "Faxina", emoji: "🧹" },
  { id: "internet", nome: "Internet", emoji: "📡" },
  { id: "alimentacao", nome: "Alimentação", emoji: "🍽️" },
  { id: "lazer", nome: "Lazer", emoji: "🎉" },
  { id: "uber", nome: "Uber", emoji: "🚗" },
  { id: "cartao-lia", nome: "Cartão Lia", emoji: "💳" },
  { id: "cartao-mae", nome: "Cartão Mãe", emoji: "💳" },
];
const CAT_RECEITA = [
  { id: "salario", nome: "Salário Fixo", emoji: "💼" },
  { id: "comissao", nome: "Comissão", emoji: "📈" },
  { id: "projetos", nome: "Projetos", emoji: "💡" },
  { id: "variavel", nome: "Receita Variável", emoji: "✨" },
];

const catDesp = (id) => CAT_DESPESA.find(c => c.id === id) || { id, nome: id, emoji: "•" };
const catRec  = (id) => CAT_RECEITA.find(c => c.id === id) || { id, nome: id, emoji: "•" };

/* =================== utilidades =================== */
const brl = (n) => "R$ " + (Number(n) || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
const numBR = (v) => parseFloat(String(v).replace(/\./g, '').replace(',', '.')) || 0;

async function storeGet(key, def) {
  try {
    if (typeof window !== 'undefined' && window.storage) {
      const r = await window.storage.get(key);
      return r ? JSON.parse(r.value) : def;
    }
    const v = localStorage.getItem(key);
    return v != null ? JSON.parse(v) : def;
  } catch { return def; }
}
async function storeSet(key, val) {
  try {
    if (typeof window !== 'undefined' && window.storage) {
      await window.storage.set(key, JSON.stringify(val)); return;
    }
    localStorage.setItem(key, JSON.stringify(val));
  } catch {}
}

/* =================== Login =================== */
function Login({ senha, onEntrar }) {
  const [valor, setValor] = useState('');
  const [erro, setErro] = useState(false);

  const tentar = () => {
    if (valor === senha) onEntrar();
    else { setErro(true); setTimeout(() => setErro(false), 1800); }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20, background: 'linear-gradient(160deg,#fffbeb 0%,#fafaf9 55%)' }}>
      <div className="alv-card alv-shadow alv-fade" style={{ maxWidth: 380, width: '100%', padding: '40px 32px' }}>
        <div style={{ textAlign: 'center', marginBottom: 28 }}>
          <div className="alv-logo" style={{ fontSize: 36, marginBottom: 8 }}>Alívio<span>.</span></div>
          <p style={{ fontSize: 13, color: 'var(--muted)', margin: 0, fontStyle: 'italic' }}>Sua vida financeira, com calma.</p>
        </div>
        <span className="alv-label">Senha</span>
        <input className="alv-input" type="password" value={valor}
          onChange={(e) => setValor(e.target.value)}
          onKeyDown={(e) => e.key === 'Enter' && tentar()}
          style={{ marginTop: 6, marginBottom: 14, borderColor: erro ? 'var(--red)' : undefined }}
          autoFocus />
        {erro && <div style={{ fontSize: 12, color: 'var(--red-deep)', marginBottom: 10, fontWeight: 700 }}>Senha incorreta.</div>}
        <button className="alv-btn alv-btn-primary" onClick={tentar} style={{ width: '100%', padding: '12px 16px', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
          <Lock size={14} /> Entrar
        </button>
      </div>
    </div>
  );
}

/* =================== Header =================== */
function Header({ mes, onSair, onAjustes }) {
  return (
    <header style={{ padding: '16px 20px', borderBottom: '1px solid var(--line)', background: 'var(--surface)', position: 'sticky', top: 0, zIndex: 10 }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
        <div className="alv-logo">Alívio<span>.</span></div>
        <div style={{ fontSize: 11.5, color: 'var(--muted)', fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase' }}>
          {mes}
        </div>
        <div className="alv-row" style={{ gap: 4 }}>
          <button className="alv-btn alv-btn-ghost" onClick={onAjustes} title="Ajustes" style={{ padding: '8px 10px' }}>
            <Settings size={16} />
          </button>
          <button className="alv-btn alv-btn-ghost" onClick={onSair} title="Sair" style={{ padding: '8px 10px' }}>
            <LogOut size={16} />
          </button>
        </div>
      </div>
    </header>
  );
}

/* =================== Seletor de mês =================== */
function MesSelector({ mes, setMes, arquivados, mostrarArq, setMostrarArq }) {
  const lista = mostrarArq ? MESES : MESES.filter(m => !arquivados.includes(m));
  return (
    <div style={{ padding: '12px 20px 0', background: 'var(--surface)', borderBottom: '1px solid var(--line)' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto' }}>
        <div className="alv-row" style={{ justifyContent: 'space-between', marginBottom: 8 }}>
          <span className="alv-label">Mês</span>
          <button className="alv-btn alv-btn-ghost" onClick={() => setMostrarArq(!mostrarArq)}
            style={{ fontSize: 11, padding: '4px 8px', color: 'var(--muted)', display: 'flex', alignItems: 'center', gap: 4 }}>
            {mostrarArq ? <EyeOff size={12} /> : <Eye size={12} />}
            {mostrarArq ? 'Esconder arquivados' : 'Mostrar arquivados'}
          </button>
        </div>
        <div className="alv-mes-strip" style={{ display: 'flex', gap: 6, overflowX: 'auto', paddingBottom: 12 }}>
          {lista.map(m => (
            <button key={m}
              className={"alv-mes " + (m === mes ? 'on' : '') + (arquivados.includes(m) ? ' arq' : '')}
              onClick={() => setMes(m)}>
              {m}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* =================== Tabs =================== */
function Tabs({ tab, setTab }) {
  const lista = [
    { id: 'painel', nome: 'Painel' },
    { id: 'receitas', nome: 'Receitas' },
    { id: 'despesas', nome: 'Despesas' },
    { id: 'historico', nome: 'Histórico' },
  ];
  return (
    <div style={{ padding: '10px 20px', background: 'var(--bg)', borderBottom: '1px solid var(--line)' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', gap: 4, overflowX: 'auto' }}>
        {lista.map(t => (
          <button key={t.id} className={"alv-tab " + (tab === t.id ? 'on' : '')} onClick={() => setTab(t.id)}>
            {t.nome}
          </button>
        ))}
      </div>
    </div>
  );
}

/* =================== Painel =================== */
function Painel({ mes, receitas, despesas }) {
  const idx = MESES.indexOf(mes);
  const mesAnt = idx > 0 ? MESES[idx - 1] : null;

  const recDoMes = receitas.filter(r => r.mes === mes).reduce((s, r) => s + (+r.valor || 0), 0);
  const recAnt = mesAnt ? receitas.filter(r => r.mes === mesAnt).reduce((s, r) => s + (+r.valor || 0), 0) : 0;
  const despDoMes = despesas.filter(d => d.mes === mes).reduce((s, d) => s + (+d.valor || 0), 0);
  const despAnt = mesAnt ? despesas.filter(d => d.mes === mesAnt).reduce((s, d) => s + (+d.valor || 0), 0) : 0;
  const saldo = recDoMes - despDoMes;

  const variacao = (a, b) => b > 0 ? ((a - b) / b) * 100 : 0;
  const vRec = variacao(recDoMes, recAnt);
  const vDesp = variacao(despDoMes, despAnt);

  const porCat = {};
  despesas.filter(d => d.mes === mes).forEach(d => {
    porCat[d.categoria] = (porCat[d.categoria] || 0) + (+d.valor || 0);
  });
  const cats = Object.entries(porCat).sort((a, b) => b[1] - a[1]);

  return (
    <div className="alv-fade" style={{ padding: '20px', maxWidth: 1100, margin: '0 auto' }}>
      <h2 style={{ fontSize: 24, fontWeight: 700, margin: '0 0 18px', letterSpacing: '-.01em' }}>Painel · {mes}</h2>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(180px,1fr))', gap: 14, marginBottom: 22 }}>
        <div className="alv-stat gold">
          <div className="alv-stat-label">Receita do mês</div>
          <div className="alv-stat-value">{brl(recDoMes)}</div>
          {mesAnt && recAnt > 0 ? (
            <div className="alv-stat-sub" style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
              {vRec >= 0 ? <ArrowUp size={11} color="#16a34a" /> : <ArrowDown size={11} color="#dc2626" />}
              <span style={{ color: vRec >= 0 ? 'var(--green-deep)' : 'var(--red-deep)', fontWeight: 700 }}>
                {vRec >= 0 ? '+' : ''}{vRec.toFixed(1)}%
              </span>
              <span>vs {mesAnt}</span>
            </div>
          ) : (
            <div className="alv-stat-sub">{mesAnt ? `Sem dados em ${mesAnt}` : 'Primeiro mês registrado'}</div>
          )}
        </div>
        <div className="alv-stat">
          <div className="alv-stat-label">Despesa do mês</div>
          <div className="alv-stat-value">{brl(despDoMes)}</div>
          {mesAnt && despAnt > 0 ? (
            <div className="alv-stat-sub" style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
              {vDesp <= 0 ? <ArrowDown size={11} color="#16a34a" /> : <ArrowUp size={11} color="#dc2626" />}
              <span style={{ color: vDesp <= 0 ? 'var(--green-deep)' : 'var(--red-deep)', fontWeight: 700 }}>
                {vDesp >= 0 ? '+' : ''}{vDesp.toFixed(1)}%
              </span>
              <span>vs {mesAnt}</span>
            </div>
          ) : (
            <div className="alv-stat-sub">{mesAnt ? `Sem dados em ${mesAnt}` : 'Primeiro mês registrado'}</div>
          )}
        </div>
        <div className={"alv-stat " + (saldo >= 0 ? 'green' : 'red')}>
          <div className="alv-stat-label">Saldo</div>
          <div className="alv-stat-value">{brl(saldo)}</div>
          <div className="alv-stat-sub">
            {recDoMes > 0
              ? `${((despDoMes / recDoMes) * 100).toFixed(1)}% da renda comprometida`
              : 'Adicione receitas para ver o quanto está comprometido'}
          </div>
        </div>
      </div>

      {cats.length > 0 && (
        <div className="alv-card alv-shadow" style={{ padding: 18, marginBottom: 16 }}>
          <div style={{ marginBottom: 12 }}>
            <span className="alv-label">Gastos por categoria · {mes}</span>
          </div>
          {cats.map(([catId, valor]) => {
            const c = catDesp(catId);
            const pct = despDoMes > 0 ? (valor / despDoMes) * 100 : 0;
            return (
              <div key={catId} style={{ marginBottom: 11 }}>
                <div className="alv-row" style={{ justifyContent: 'space-between', marginBottom: 5, fontSize: 13 }}>
                  <span style={{ fontWeight: 700 }}>{c.emoji} {c.nome}</span>
                  <span style={{ fontWeight: 700 }}>{brl(valor)} <span style={{ color: 'var(--muted)', fontWeight: 400 }}>· {pct.toFixed(0)}%</span></span>
                </div>
                <div style={{ height: 6, background: 'var(--surface2)', borderRadius: 3, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: pct + '%', background: 'var(--gold)', transition: 'width .3s' }} />
                </div>
              </div>
            );
          })}
        </div>
      )}

      {cats.length === 0 && recDoMes === 0 && (
        <div className="alv-card" style={{ padding: 36, textAlign: 'center', color: 'var(--muted)', fontSize: 14 }}>
          Nenhum lançamento em {mes}. Comece adicionando receitas e despesas.
        </div>
      )}
    </div>
  );
}

/* =================== Form de Receita =================== */
function FormReceita({ mes, inicial, onSalvar, onCancelar }) {
  const [tipo, setTipo] = useState(inicial?.categoria || 'salario');
  const [descricao, setDescricao] = useState(inicial?.descricao || '');
  const [valor, setValor] = useState(inicial ? String(inicial.valor).replace('.', ',') : '');

  const salvar = () => {
    const v = numBR(valor);
    if (!descricao.trim() || v <= 0) return;
    onSalvar({
      id: inicial?.id || uid(),
      mes, categoria: tipo, descricao: descricao.trim(), valor: v,
      criadaEm: inicial?.criadaEm || new Date().toISOString(),
    });
  };

  return (
    <div className="alv-card alv-shadow alv-fade" style={{ padding: 18, marginBottom: 14, borderColor: 'var(--gold-line)' }}>
      <span className="alv-label">{inicial ? 'Editar receita' : 'Nova receita'}</span>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 10 }}>
        <div style={{ gridColumn: '1/-1' }}>
          <input className="alv-input" placeholder="Descrição (ex: Salário Empresa X)"
            value={descricao} onChange={(e) => setDescricao(e.target.value)} autoFocus />
        </div>
        <div>
          <select className="alv-input" value={tipo} onChange={(e) => setTipo(e.target.value)}>
            {CAT_RECEITA.map(c => <option key={c.id} value={c.id}>{c.emoji} {c.nome}</option>)}
          </select>
        </div>
        <div>
          <input className="alv-input" type="text" inputMode="decimal" placeholder="R$ 0,00"
            value={valor} onChange={(e) => setValor(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && salvar()} />
        </div>
      </div>
      <div className="alv-row" style={{ gap: 8, marginTop: 12, justifyContent: 'flex-end' }}>
        <button className="alv-btn alv-btn-ghost" onClick={onCancelar} style={{ padding: '8px 14px', fontSize: 13 }}>Cancelar</button>
        <button className="alv-btn alv-btn-primary" onClick={salvar} style={{ padding: '8px 14px', fontSize: 13 }}>
          {inicial ? 'Salvar' : 'Adicionar'}
        </button>
      </div>
    </div>
  );
}

/* =================== Receitas =================== */
function Receitas({ mes, receitas, setReceitas }) {
  const [add, setAdd] = useState(false);
  const [editando, setEditando] = useState(null);

  const doMes = receitas.filter(r => r.mes === mes);
  const total = doMes.reduce((s, r) => s + (+r.valor || 0), 0);

  const porCat = {};
  doMes.forEach(r => { porCat[r.categoria] = (porCat[r.categoria] || 0) + (+r.valor || 0); });

  const salvar = (item) => {
    setReceitas(prev => {
      const i = prev.findIndex(r => r.id === item.id);
      if (i >= 0) { const next = [...prev]; next[i] = item; return next; }
      return [item, ...prev];
    });
    setAdd(false); setEditando(null);
  };

  const remover = (id) => {
    if (window.confirm('Apagar esta receita?')) setReceitas(prev => prev.filter(r => r.id !== id));
  };

  return (
    <div className="alv-fade" style={{ padding: '20px', maxWidth: 1100, margin: '0 auto' }}>
      <div className="alv-row" style={{ justifyContent: 'space-between', marginBottom: 16, flexWrap: 'wrap', gap: 10 }}>
        <h2 style={{ fontSize: 24, fontWeight: 700, margin: 0, letterSpacing: '-.01em' }}>Receitas · {mes}</h2>
        {!add && !editando && (
          <button className="alv-btn alv-btn-primary" onClick={() => setAdd(true)}
            style={{ padding: '9px 14px', fontSize: 13, display: 'flex', alignItems: 'center', gap: 5 }}>
            <Plus size={14} /> Nova receita
          </button>
        )}
      </div>

      <div className="alv-stat gold" style={{ marginBottom: 18 }}>
        <div className="alv-stat-label">Total de receitas</div>
        <div className="alv-stat-value">{brl(total)}</div>
        <div className="alv-stat-sub">{doMes.length} {doMes.length === 1 ? 'lançamento' : 'lançamentos'} em {mes}</div>
      </div>

      {add && <FormReceita mes={mes} onSalvar={salvar} onCancelar={() => setAdd(false)} />}
      {editando && <FormReceita mes={mes} inicial={editando} onSalvar={salvar} onCancelar={() => setEditando(null)} />}

      {Object.keys(porCat).length > 0 && (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(160px,1fr))', gap: 10, marginBottom: 18 }}>
          {CAT_RECEITA.filter(c => porCat[c.id]).map(c => (
            <div key={c.id} className="alv-card" style={{ padding: '12px 14px' }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--muted)', marginBottom: 3, textTransform: 'uppercase', letterSpacing: '.04em' }}>
                {c.emoji} {c.nome}
              </div>
              <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--gold-deep)' }}>{brl(porCat[c.id])}</div>
            </div>
          ))}
        </div>
      )}

      {doMes.length === 0 && !add && (
        <div className="alv-card" style={{ padding: 36, textAlign: 'center', color: 'var(--muted)', fontSize: 14 }}>
          Nenhuma receita lançada em {mes}.
        </div>
      )}

      {doMes.length > 0 && (
        <div>
          <span className="alv-label" style={{ display: 'block', marginBottom: 8 }}>Lançamentos</span>
          {doMes.map(r => {
            const c = catRec(r.categoria);
            return (
              <div key={r.id} className="alv-item">
                <span className="alv-cat-tag">{c.emoji} {c.nome}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.descricao}</div>
                </div>
                <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--gold-deep)', whiteSpace: 'nowrap' }}>{brl(r.valor)}</div>
                <button className="alv-btn alv-btn-ghost" onClick={() => setEditando(r)} title="Editar" style={{ padding: 6 }}>
                  <Pencil size={14} />
                </button>
                <button className="alv-btn alv-btn-ghost" onClick={() => remover(r.id)} title="Apagar" style={{ padding: 6, color: 'var(--red)' }}>
                  <Trash2 size={14} />
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* =================== Form de Despesa =================== */
function FormDespesa({ mes, inicial, onSalvar, onCancelar }) {
  const [cat, setCat] = useState(inicial?.categoria || 'moradia');
  const [descricao, setDescricao] = useState(inicial?.descricao || '');
  const [valor, setValor] = useState(inicial ? String(inicial.valor).replace('.', ',') : '');
  const [obs, setObs] = useState(inicial?.obs || '');
  const [data, setData] = useState(inicial?.data || new Date().toISOString().slice(0, 10));

  const salvar = () => {
    const v = numBR(valor);
    if (!descricao.trim() || v <= 0) return;
    onSalvar({
      id: inicial?.id || uid(),
      mes, categoria: cat, descricao: descricao.trim(), valor: v, obs: obs.trim(), data,
      criadaEm: inicial?.criadaEm || new Date().toISOString(),
    });
  };

  return (
    <div className="alv-card alv-shadow alv-fade" style={{ padding: 18, marginBottom: 14, borderColor: 'var(--gold-line)' }}>
      <span className="alv-label">{inicial ? 'Editar despesa' : 'Nova despesa'}</span>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 10 }}>
        <div style={{ gridColumn: '1/-1' }}>
          <input className="alv-input" placeholder="Descrição (ex: Conta de luz)"
            value={descricao} onChange={(e) => setDescricao(e.target.value)} autoFocus />
        </div>
        <div>
          <select className="alv-input" value={cat} onChange={(e) => setCat(e.target.value)}>
            {CAT_DESPESA.map(c => <option key={c.id} value={c.id}>{c.emoji} {c.nome}</option>)}
          </select>
        </div>
        <div>
          <input className="alv-input" type="text" inputMode="decimal" placeholder="R$ 0,00"
            value={valor} onChange={(e) => setValor(e.target.value)} />
        </div>
        <div>
          <input className="alv-input" type="date" value={data} onChange={(e) => setData(e.target.value)} />
        </div>
        <div>
          <input className="alv-input" placeholder="Observações (opcional)"
            value={obs} onChange={(e) => setObs(e.target.value)} />
        </div>
      </div>
      <div className="alv-row" style={{ gap: 8, marginTop: 12, justifyContent: 'flex-end' }}>
        <button className="alv-btn alv-btn-ghost" onClick={onCancelar} style={{ padding: '8px 14px', fontSize: 13 }}>Cancelar</button>
        <button className="alv-btn alv-btn-primary" onClick={salvar} style={{ padding: '8px 14px', fontSize: 13 }}>
          {inicial ? 'Salvar' : 'Adicionar'}
        </button>
      </div>
    </div>
  );
}

/* =================== Despesas =================== */
function Despesas({ mes, despesas, setDespesas }) {
  const [add, setAdd] = useState(false);
  const [editando, setEditando] = useState(null);
  const [filtroCat, setFiltroCat] = useState('todas');

  const doMes = despesas.filter(d => d.mes === mes);
  const filtradas = filtroCat === 'todas' ? doMes : doMes.filter(d => d.categoria === filtroCat);
  const total = doMes.reduce((s, d) => s + (+d.valor || 0), 0);

  const porCat = {};
  doMes.forEach(d => { porCat[d.categoria] = (porCat[d.categoria] || 0) + (+d.valor || 0); });
  const ranking = Object.entries(porCat).sort((a, b) => b[1] - a[1]);
  const top = ranking[0];

  const salvar = (item) => {
    setDespesas(prev => {
      const i = prev.findIndex(d => d.id === item.id);
      if (i >= 0) { const next = [...prev]; next[i] = item; return next; }
      return [item, ...prev];
    });
    setAdd(false); setEditando(null);
  };

  const remover = (id) => {
    if (window.confirm('Apagar esta despesa?')) setDespesas(prev => prev.filter(d => d.id !== id));
  };

  return (
    <div className="alv-fade" style={{ padding: '20px', maxWidth: 1100, margin: '0 auto' }}>
      <div className="alv-row" style={{ justifyContent: 'space-between', marginBottom: 16, flexWrap: 'wrap', gap: 10 }}>
        <h2 style={{ fontSize: 24, fontWeight: 700, margin: 0, letterSpacing: '-.01em' }}>Despesas · {mes}</h2>
        {!add && !editando && (
          <button className="alv-btn alv-btn-primary" onClick={() => setAdd(true)}
            style={{ padding: '9px 14px', fontSize: 13, display: 'flex', alignItems: 'center', gap: 5 }}>
            <Plus size={14} /> Nova despesa
          </button>
        )}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(180px,1fr))', gap: 12, marginBottom: 18 }}>
        <div className="alv-stat">
          <div className="alv-stat-label">Total de despesas</div>
          <div className="alv-stat-value">{brl(total)}</div>
          <div className="alv-stat-sub">{doMes.length} {doMes.length === 1 ? 'lançamento' : 'lançamentos'}</div>
        </div>
        {top && (
          <div className="alv-stat">
            <div className="alv-stat-label">Maior categoria</div>
            <div className="alv-stat-value" style={{ fontSize: 22 }}>{catDesp(top[0]).emoji} {catDesp(top[0]).nome}</div>
            <div className="alv-stat-sub">{brl(top[1])} · {((top[1] / total) * 100).toFixed(0)}% do total</div>
          </div>
        )}
      </div>

      {add && <FormDespesa mes={mes} onSalvar={salvar} onCancelar={() => setAdd(false)} />}
      {editando && <FormDespesa mes={mes} inicial={editando} onSalvar={salvar} onCancelar={() => setEditando(null)} />}

      {Object.keys(porCat).length > 0 && (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(140px,1fr))', gap: 8, marginBottom: 18 }}>
          <button onClick={() => setFiltroCat('todas')}
            style={{
              padding: '10px 12px', textAlign: 'left', cursor: 'pointer', borderRadius: 11,
              border: filtroCat === 'todas' ? '2px solid var(--gold)' : '1px solid var(--line)',
              background: 'var(--surface)', fontFamily: 'inherit',
            }}>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: 'var(--muted)', letterSpacing: '.05em' }}>TODAS</div>
            <div style={{ fontSize: 15, fontWeight: 700 }}>{brl(total)}</div>
          </button>
          {ranking.map(([catId, valor]) => {
            const c = catDesp(catId);
            return (
              <button key={catId}
                onClick={() => setFiltroCat(filtroCat === catId ? 'todas' : catId)}
                style={{
                  padding: '10px 12px', textAlign: 'left', cursor: 'pointer', borderRadius: 11,
                  border: filtroCat === catId ? '2px solid var(--gold)' : '1px solid var(--line)',
                  background: 'var(--surface)', fontFamily: 'inherit',
                }}>
                <div style={{ fontSize: 10.5, fontWeight: 700, color: 'var(--muted)', letterSpacing: '.05em' }}>{c.emoji} {c.nome.toUpperCase()}</div>
                <div style={{ fontSize: 15, fontWeight: 700 }}>{brl(valor)}</div>
              </button>
            );
          })}
        </div>
      )}

      {filtradas.length === 0 && !add && (
        <div className="alv-card" style={{ padding: 36, textAlign: 'center', color: 'var(--muted)', fontSize: 14 }}>
          {filtroCat === 'todas'
            ? `Nenhuma despesa lançada em ${mes}.`
            : `Nenhuma despesa de ${catDesp(filtroCat).nome} em ${mes}.`}
        </div>
      )}

      {filtradas.length > 0 && (
        <div>
          <span className="alv-label" style={{ display: 'block', marginBottom: 8 }}>
            Lançamentos {filtroCat !== 'todas' && `· ${catDesp(filtroCat).nome}`}
          </span>
          {filtradas.map(d => {
            const c = catDesp(d.categoria);
            return (
              <div key={d.id} className="alv-item" style={{ flexWrap: 'wrap' }}>
                <span className="alv-cat-tag">{c.emoji} {c.nome}</span>
                <div style={{ flex: 1, minWidth: 120 }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{d.descricao}</div>
                  {(d.obs || d.data) && (
                    <div style={{ fontSize: 11.5, color: 'var(--muted)', marginTop: 2 }}>
                      {d.data && new Date(d.data + 'T00:00:00').toLocaleDateString('pt-BR')}
                      {d.obs && (d.data ? ' · ' : '') + d.obs}
                    </div>
                  )}
                </div>
                <div style={{ fontWeight: 700, fontSize: 15, whiteSpace: 'nowrap' }}>{brl(d.valor)}</div>
                <button className="alv-btn alv-btn-ghost" onClick={() => setEditando(d)} title="Editar" style={{ padding: 6 }}>
                  <Pencil size={14} />
                </button>
                <button className="alv-btn alv-btn-ghost" onClick={() => remover(d.id)} title="Apagar" style={{ padding: 6, color: 'var(--red)' }}>
                  <Trash2 size={14} />
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* =================== Histórico =================== */
function Historico({ receitas, despesas, arquivados, setArquivados, setMes }) {
  const dados = MESES.map(m => {
    const r = receitas.filter(x => x.mes === m).reduce((s, x) => s + (+x.valor || 0), 0);
    const d = despesas.filter(x => x.mes === m).reduce((s, x) => s + (+x.valor || 0), 0);
    return { mes: m, receitas: r, despesas: d, saldo: r - d, arquivado: arquivados.includes(m), temDados: r > 0 || d > 0 };
  });

  const toggleArq = (m) => {
    setArquivados(prev => prev.includes(m) ? prev.filter(x => x !== m) : [...prev, m]);
  };

  const comDados = dados.filter(x => x.temDados);

  return (
    <div className="alv-fade" style={{ padding: '20px', maxWidth: 1100, margin: '0 auto' }}>
      <h2 style={{ fontSize: 24, fontWeight: 700, margin: '0 0 18px', letterSpacing: '-.01em' }}>Histórico</h2>

      {comDados.length === 0 ? (
        <div className="alv-card" style={{ padding: 36, textAlign: 'center', color: 'var(--muted)', fontSize: 14 }}>
          Sem histórico ainda. Adicione lançamentos em algum mês para começar a ver a evolução.
        </div>
      ) : (
        <>
          <div className="alv-card alv-shadow" style={{ padding: 18, marginBottom: 18 }}>
            <span className="alv-label" style={{ display: 'block', marginBottom: 10 }}>Evolução de receitas e despesas</span>
            <div style={{ height: 260 }}>
              <ResponsiveContainer>
                <BarChart data={comDados.map(x => ({ mes: x.mes, Receitas: +x.receitas.toFixed(2), Despesas: +x.despesas.toFixed(2) }))}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#e7e5e4" vertical={false} />
                  <XAxis dataKey="mes" tick={{ fontSize: 10, fill: '#78716c' }} />
                  <YAxis tick={{ fontSize: 10, fill: '#78716c' }} tickFormatter={(v) => 'R$ ' + (v / 1000).toFixed(0) + 'k'} />
                  <Tooltip formatter={(v) => brl(v)} contentStyle={{ fontSize: 12, fontFamily: 'Carlito,sans-serif' }} />
                  <Legend wrapperStyle={{ fontSize: 12 }} />
                  <Bar dataKey="Receitas" fill="#d4a017" radius={[5, 5, 0, 0]} />
                  <Bar dataKey="Despesas" fill="#1c1917" radius={[5, 5, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>

          <div>
            <span className="alv-label" style={{ display: 'block', marginBottom: 10 }}>Resumo por mês</span>
            {dados.map(x => (
              <div key={x.mes} className="alv-item" style={{ opacity: x.arquivado ? .55 : 1, flexWrap: 'wrap' }}>
                <button onClick={() => setMes(x.mes)} className="alv-btn alv-btn-ghost"
                  style={{ padding: '5px 10px', fontWeight: 700, minWidth: 78, textAlign: 'left', fontSize: 13 }}>
                  {x.mes}
                </button>
                <div style={{ flex: 1, display: 'flex', gap: 18, flexWrap: 'wrap', minWidth: 0 }}>
                  <div style={{ fontSize: 12 }}>
                    <div style={{ color: 'var(--muted)', fontWeight: 700, fontSize: 10, letterSpacing: '.05em' }}>RECEITAS</div>
                    <div style={{ fontWeight: 700, color: 'var(--gold-deep)' }}>{brl(x.receitas)}</div>
                  </div>
                  <div style={{ fontSize: 12 }}>
                    <div style={{ color: 'var(--muted)', fontWeight: 700, fontSize: 10, letterSpacing: '.05em' }}>DESPESAS</div>
                    <div style={{ fontWeight: 700 }}>{brl(x.despesas)}</div>
                  </div>
                  <div style={{ fontSize: 12 }}>
                    <div style={{ color: 'var(--muted)', fontWeight: 700, fontSize: 10, letterSpacing: '.05em' }}>SALDO</div>
                    <div style={{ fontWeight: 700, color: x.saldo >= 0 ? 'var(--green-deep)' : 'var(--red-deep)' }}>{brl(x.saldo)}</div>
                  </div>
                </div>
                <button className="alv-btn alv-btn-ghost" onClick={() => toggleArq(x.mes)}
                  title={x.arquivado ? 'Desarquivar' : 'Arquivar'}
                  style={{ padding: 6, color: 'var(--muted)' }}>
                  <Archive size={14} />
                </button>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* =================== Ajustes =================== */
function Ajustes({ senha, setSenha, onVoltar }) {
  const [nova, setNova] = useState('');
  const [conf, setConf] = useState('');
  const [msg, setMsg] = useState(null);

  const trocar = () => {
    if (!nova || nova.length < 4) { setMsg({ ok: false, t: 'A senha precisa ter pelo menos 4 caracteres.' }); return; }
    if (nova !== conf) { setMsg({ ok: false, t: 'As senhas não conferem.' }); return; }
    setSenha(nova);
    setNova(''); setConf('');
    setMsg({ ok: true, t: 'Senha alterada.' });
    setTimeout(() => setMsg(null), 2500);
  };

  return (
    <div className="alv-fade" style={{ padding: '20px', maxWidth: 600, margin: '0 auto' }}>
      <div className="alv-row" style={{ marginBottom: 14, gap: 10 }}>
        <button className="alv-btn alv-btn-ghost" onClick={onVoltar} style={{ padding: '6px 10px', fontSize: 13, display: 'flex', alignItems: 'center', gap: 4 }}>
          <ArrowLeft size={14} /> Voltar
        </button>
      </div>
      <h2 style={{ fontSize: 24, fontWeight: 700, margin: '0 0 18px', letterSpacing: '-.01em' }}>Ajustes</h2>

      <div className="alv-card alv-shadow" style={{ padding: 20, marginBottom: 14 }}>
        <span className="alv-label">Trocar senha</span>
        <div style={{ marginTop: 12 }}>
          <input className="alv-input" type="password" placeholder="Nova senha" value={nova}
            onChange={(e) => setNova(e.target.value)} style={{ marginBottom: 10 }} />
          <input className="alv-input" type="password" placeholder="Confirmar nova senha" value={conf}
            onChange={(e) => setConf(e.target.value)} style={{ marginBottom: 12 }} />
          <button className="alv-btn alv-btn-primary" onClick={trocar} style={{ padding: '9px 14px', fontSize: 13 }}>
            Salvar
          </button>
          {msg && (
            <div style={{ marginTop: 10, fontSize: 12.5, color: msg.ok ? 'var(--green-deep)' : 'var(--red-deep)', fontWeight: 700 }}>
              {msg.t}
            </div>
          )}
        </div>
      </div>

      <div className="alv-card" style={{ padding: 18, fontSize: 12.5, color: 'var(--muted)', lineHeight: 1.6 }}>
        <b style={{ color: 'var(--ink)' }}>Sobre os dados:</b> tudo o que você lança é salvo automaticamente neste navegador.
        Em breve, a sincronização com a planilha do Google estará disponível também aqui — assim você poderá usar no celular
        e no notebook vendo os mesmos dados, e ter um backup automático.
      </div>
    </div>
  );
}

/* =================== App =================== */
function App() {
  const [loaded, setLoaded] = useState(false);
  const [logado, setLogado] = useState(false);
  const [senha, setSenha] = useState(SENHA_INICIAL);
  const [receitas, setReceitas] = useState([]);
  const [despesas, setDespesas] = useState([]);
  const [mes, setMes] = useState(MES_PADRAO);
  const [arquivados, setArquivados] = useState([]);
  const [tab, setTab] = useState('painel');
  const [mostrarArq, setMostrarArq] = useState(false);

  // carrega tudo
  useEffect(() => {
    (async () => {
      setSenha(await storeGet('alivio_senha', SENHA_INICIAL));
      setLogado(await storeGet('alivio_logado', false));
      setReceitas(await storeGet('alivio_receitas', []));
      setDespesas(await storeGet('alivio_despesas', []));
      setMes(await storeGet('alivio_mes', MES_PADRAO));
      setArquivados(await storeGet('alivio_arquivados', []));
      setLoaded(true);
    })();
  }, []);

  // salva tudo
  useEffect(() => { if (loaded) storeSet('alivio_senha', senha); }, [senha, loaded]);
  useEffect(() => { if (loaded) storeSet('alivio_logado', logado); }, [logado, loaded]);
  useEffect(() => { if (loaded) storeSet('alivio_receitas', receitas); }, [receitas, loaded]);
  useEffect(() => { if (loaded) storeSet('alivio_despesas', despesas); }, [despesas, loaded]);
  useEffect(() => { if (loaded) storeSet('alivio_mes', mes); }, [mes, loaded]);
  useEffect(() => { if (loaded) storeSet('alivio_arquivados', arquivados); }, [arquivados, loaded]);

  if (!loaded) return <div id="carregando">Carregando o Alívio…</div>;
  if (!logado) return <Login senha={senha} onEntrar={() => setLogado(true)} />;

  const emAjustes = tab === 'ajustes';

  return (
    <div className="alv-shell">
      <Header mes={mes} onSair={() => setLogado(false)} onAjustes={() => setTab('ajustes')} />
      {!emAjustes && (
        <>
          <MesSelector mes={mes} setMes={setMes} arquivados={arquivados} mostrarArq={mostrarArq} setMostrarArq={setMostrarArq} />
          <Tabs tab={tab} setTab={setTab} />
        </>
      )}
      <main>
        {tab === 'painel' && <Painel mes={mes} receitas={receitas} despesas={despesas} />}
        {tab === 'receitas' && <Receitas mes={mes} receitas={receitas} setReceitas={setReceitas} />}
        {tab === 'despesas' && <Despesas mes={mes} despesas={despesas} setDespesas={setDespesas} />}
        {tab === 'historico' && <Historico receitas={receitas} despesas={despesas} arquivados={arquivados} setArquivados={setArquivados} setMes={(m) => { setMes(m); setTab('painel'); }} />}
        {tab === 'ajustes' && <Ajustes senha={senha} setSenha={setSenha} onVoltar={() => setTab('painel')} />}
      </main>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
